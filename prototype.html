<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title> Prototypes | Maura Gabriele</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Montserrat', sans-serif;
      background-color: #ffffff;
      color: #0b1a33;
      margin: 0;
      padding: 2rem;
    }

    nav {
      background-color: #ffffff;
      border-bottom: 1px solid #e0e0e0;
      padding: 1rem 2rem;
      text-align: center;
    }

    nav a {
      color: #0b1a33;
      margin: 0 20px;
      font-weight: 600;
      font-size: 1rem;
      text-decoration: none;
      transition: color 0.3s;
    }

    nav a:hover {
      color: #a7c7e7;
    }

    h1 {
      font-size: 2.5rem;
      border-left: 5px solid #a7c7e7;
      padding-left: 1rem;
      margin-top: 2rem;
    }

    p {
      font-size: 1.1rem;
      line-height: 1.6;
      max-width: 800px;
      margin-top: 1rem;
    }

    a.back-link {
      display: inline-block;
      margin-top: 2rem;
      text-decoration: underline;
    }
	 .projects {
    max-width: 1400px;
    margin: 0 auto;
    padding: 120px 40px;
}

.project {
    display: grid;
    grid-template-columns: 1.3fr 1fr;
    gap: 80px;
    align-items: center;
    margin-bottom: 160px;
}

.project-media video {
    width: 100%;
    border-radius: 30px;
    object-fit: cover;
}

.project-number {
    font-size: 6rem;
    font-weight: 700;
    color: #e8e8e8;
    display: block;
}

.project-content h3 {
    font-size: 3rem;
    margin: 10px 0;
}

.project-type {
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #888;
    margin-bottom: 20px;
}

.project-content p {
    line-height: 1.9;
    font-size: 1.1rem;
}

.project-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 30px;
}

.project-tags span {
    border: 1px solid #ddd;
    border-radius: 999px;
    padding: 10px 18px;
}
	  .project video {
    width: 100%;
    max-width: 320px;
    margin: 0 auto;
    display: block;
    border-radius: 32px;
    box-shadow:
        0 30px 60px rgba(0, 0, 0, 0.12),
        0 10px 20px rgba(0, 0, 0, 0.08);
}
	  .project {
    text-align: center;
}
	  .project {
    margin-bottom: 120px;
}

.project video {
    display: block;
    width: 100%;
    max-width: 320px;
    margin: 40px auto; /* adds space above and below */

    border-radius: 24px;
    object-fit: cover;
}
	  .project-media {
    display: flex;
    justify-content: center;
    padding: 60px 0;
}

.project video {
    width: 100%;
    max-width: 320px;
    border-radius: 24px;
    box-shadow:
        0 10px 30px rgba(0,0,0,.08),
        0 30px 80px rgba(0,0,0,.12);
}
	  .portfolio-video {
    display: block;

    width: 100%;
    max-width: 320px;

    height: auto;

    margin: 0 auto;

    border-radius: 24px;

    object-fit: cover;

    box-shadow:
        0 10px 30px rgba(0,0,0,.08),
        0 25px 60px rgba(0,0,0,.12);
}

.project-media {
    line-height: 0;
}
  </style>
</head>
<body>

  <nav>
    <a href="index.html">About Me</a>
    <a href="capstone.html">Capstone</a>
    <a href="work.html">Work</a>
    <a href="resume.html">Resume</a>
  </nav>

  <section class="projects">

<section class="work-section">

    <div class="section-title">
        <h2>Selected Work</h2>
    </div>

    <article class="project">

        <span class="project-number">01</span>

        <h3>Beauty Besties</h3>

        <p class="project-description">
            Social-first beauty campaign focused on community,
            product discovery, and playful engagement.
        </p>

<video
    class="portfolio-video"
    autoplay
    muted
    loop
    playsinline
>
    <source src="beauty besties.mp4" type="video/mp4">
</video>
    </article>

    <article class="project">

        <span class="project-number">02</span>

        <h3>Beauty Inspo</h3>

        <p class="project-description">
            Editorial-style campaign designed to inspire product exploration
            and seasonal beauty trends.
        </p>

<video
    class="portfolio-video"
    autoplay
    muted
    loop
    playsinline
>
    <source src="beauty inspo.mp4" type="video/mp4">
</video>

    </article>

</section>

</section>

  <a class="back-link" href="index.html">← Back to Home</a>

</body>
</html>
